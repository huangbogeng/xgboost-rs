name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

  rust:
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: infer-serial
            feature_args: --no-default-features --features infer-serial
          - backend: infer-row-parallel
            feature_args: --no-default-features --features infer-row-parallel
          - backend: infer-tree-parallel
            feature_args: --no-default-features --features infer-tree-parallel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy (${{ matrix.backend }})
        run: cargo clippy --all-targets ${{ matrix.feature_args }} -- -D warnings

      - name: Test (${{ matrix.backend }})
        run: cargo test --all-targets ${{ matrix.feature_args }}
